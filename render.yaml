services:
  - type: web
    name: people-pluse-backend
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./people_pluse.db
      - key: SECRET_KEY
        generateValue: true